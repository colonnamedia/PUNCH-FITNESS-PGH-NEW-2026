<div id="plp">
  <div class="s" style="padding-top:60px">
    <div class="si">
      <div id="post-root" style="max-width:760px;margin:0 auto">
        <p class="trial-note">Loading…</p>
      </div>
      <div style="max-width:760px;margin:44px auto 0;text-align:center">
        <a href="/blog-events" class="btn-dark">&larr; All Posts</a>
      </div>
    </div>
  </div>

  <div class="final">
    <span class="lbl" style="color:rgba(255,255,255,.6)">Ready to Train?</span>
    <div class="final-title">Your First Class Is Free.</div>
    <div class="final-sub">Come try it in person — no experience needed, all levels welcome.</div>
    <div class="final-btns">
      <a href="https://punchpgh.pushpress.com/landing/plans/plan_c63218daed254b" class="btn-wht" target="_blank" rel="noopener">Claim My Free Class</a>
      <a href="/membership-options" class="btn-ghost-w">See Memberships</a>
    </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const CFG = window.PUNCH_CONFIG || {};
const root = document.getElementById("post-root");
const slug = new URLSearchParams(location.search).get("slug");
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const when = d => new Date(d).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});

// Minimal, safe markdown: escape first, then apply a small set of patterns.
function md(src){
  let t = esc(src);
  t = t.replace(/^### (.*)$/gm,"<h3>$1</h3>").replace(/^## (.*)$/gm,"<h2>$1</h2>");
  t = t.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<em>$2</em>");
  const lines = t.split(/\n/); let out=[], inList=false, para=[];
  const flush=()=>{ if(para.length){ out.push("<p>"+para.join(" ")+"</p>"); para=[]; } };
  for (const ln of lines){
    const s = ln.trim();
    if (/^<h[23]>/.test(s)){ flush(); if(inList){out.push("</ul>");inList=false;} out.push(s); }
    else if (/^[-*] /.test(s)){ flush(); if(!inList){out.push("<ul>");inList=true;} out.push("<li>"+s.slice(2)+"</li>"); }
    else if (!s){ flush(); if(inList){out.push("</ul>");inList=false;} }
    else para.push(s);
  }
  flush(); if(inList) out.push("</ul>");
  return out.join("");
}

if (!slug){ root.innerHTML = '<p class="trial-note">No post selected.</p>'; }
else if (!CFG.SUPABASE_URL || CFG.SUPABASE_URL.includes("YOUR-PROJECT")){
  root.innerHTML = '<p class="trial-note">Blog is being set up.</p>';
} else {
  const sb = createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
  load(sb);
}
async function load(sb){
  const { data, error } = await sb.from("blog_posts").select("*").eq("slug", slug).eq("published",true).single();
  if (error || !data){ root.innerHTML = '<p class="trial-note">Post not found. <a href="/blog-events" style="color:#D92B2B">See all posts</a></p>'; return; }
  document.title = data.title + " | Punch Boxing & Fitness";
  const dm = document.querySelector('meta[name="description"]');
  if (dm && data.excerpt) dm.setAttribute("content", data.excerpt);
  const link = document.createElement("link"); link.rel="canonical";
  link.href = "https://punchpgh.com/post?slug=" + encodeURIComponent(data.slug);
  document.head.appendChild(link);

  root.innerHTML = `
    <div class="bpost-topic" style="margin-bottom:12px">${esc(data.topic)}</div>
    <h1 class="h2" style="font-size:clamp(34px,5vw,54px);margin-bottom:10px">${esc(data.title)}</h1>
    <div class="bpost-date" style="margin-bottom:26px">${when(data.created_at)}</div>
    ${data.image_url ? `<img src="${esc(data.image_url)}" alt="${esc(data.title)}" style="width:100%;border-radius:14px;margin-bottom:28px">` : ""}
    <div class="article">${md(data.body)}</div>`;

  const ld = {"@context":"https://schema.org","@type":"BlogPosting","headline":data.title,
    "datePublished":data.created_at,"description":data.excerpt||"",
    "url":"https://punchpgh.com/post?slug="+encodeURIComponent(data.slug),
    "author":{"@type":"Organization","name":"Punch Boxing & Fitness"},
    "publisher":{"@type":"Organization","name":"Punch Boxing & Fitness"}};
  const s=document.createElement("script"); s.type="application/ld+json";
  s.textContent=JSON.stringify(ld); document.head.appendChild(s);
}
</script>
</body>
