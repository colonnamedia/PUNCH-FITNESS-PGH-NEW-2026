<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Punch Admin · Products</title>
<link rel="stylesheet" href="/admin.css" />
<script src="/config.js"></script>
</head>
<body>

<!-- ============================== LOGIN ============================== -->
<div class="login" id="loginView">
  <div class="login-card">
    <div class="login-mark">PUN<span>CH</span></div>
    <div class="login-sub">Admin Dashboard</div>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@punchpgh.com" />
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
    <button class="btn btn-red btn-block" id="loginBtn">Sign In</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ============================== APP ============================== -->
<div class="app hide" id="appView">
  <aside class="side">
    <div class="side-mark">PUN<span>CH</span></div>
    <nav class="nav">
      <a class="active"><span class="i">▦</span> Products</a>
      <a id="navAdd"><span class="i">＋</span> Add Product</a>
      <a href="/punch-apparel.html" target="_blank"><span class="i">↗</span> View Store</a>
    </nav>
    <div class="side-foot">
      <div class="side-user" id="whoami"></div>
      <a id="signout"><span class="i">⏻</span> Sign Out</a>
    </div>
  </aside>

  <main class="main">
    <div class="top">
      <div>
        <h1 class="mono-h">Products</h1>
        <div class="sub">Add, edit, and remove items from the Punch store.</div>
      </div>
      <button class="btn btn-red" id="addBtn">＋ Add Product</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="panel">
      <div class="panel-h"><h2>All Products</h2></div>
      <div id="list"></div>
    </div>
  </main>
</div>

<!-- ============================== FORM MODAL ============================== -->
<div class="overlay hide" id="modal">
  <div class="modal">
    <div class="modal-h">
      <h3 id="modalTitle">Add Product</h3>
      <button class="x" id="modalClose">×</button>
    </div>

    <label>Product Photo</label>
    <div class="drop" id="drop">
      <div class="drop-ic">📷</div>
      <div class="drop-t">Click or drag an image</div>
      <div class="drop-s">JPG or PNG · square works best</div>
      <input type="file" id="file" accept="image/*" class="hide" />
    </div>

    <label for="pName">Name</label>
    <input id="pName" placeholder="Punch Fight Club Tee" />

    <div class="grid2">
      <div>
        <label for="pPrice">Price (USD)</label>
        <input id="pPrice" type="number" step="0.01" min="0" placeholder="24.50" />
      </div>
      <div>
        <label for="pCat">Category</label>
        <input id="pCat" list="cats" placeholder="Tops & Tanks" />
        <datalist id="cats">
          <option>Tops &amp; Tanks</option><option>Crops &amp; Sports Bras</option>
          <option>Bottoms</option><option>Outerwear</option><option>Accessories</option>
        </datalist>
      </div>
    </div>

    <label for="pDesc">Description (optional)</label>
    <textarea id="pDesc" placeholder="Soft cotton blend, studio-tested fit."></textarea>

    <label for="pStripe">Stripe Payment Link (optional — enables the Buy button)</label>
    <input id="pStripe" placeholder="https://buy.stripe.com/..." />

    <div class="grid2">
      <div class="row-check"><input type="checkbox" id="pFrom" /><label for="pFrom">Show “from” price</label></div>
      <div class="row-check"><input type="checkbox" id="pActive" checked /><label for="pActive">Visible in store</label></div>
    </div>

    <button class="btn btn-red btn-block" id="saveBtn">Save Product</button>
    <div class="err" id="formErr"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const CFG = window.PUNCH_CONFIG || {};
const $ = (id) => document.getElementById(id);
const toast = (msg, bad=false) => { const t=$("toast"); t.textContent=msg; t.className="toast show"+(bad?" bad":""); setTimeout(()=>t.className="toast",2600); };

let sb, editingId=null, pickedFile=null, existingImg=null;

if (!CFG.SUPABASE_URL || CFG.SUPABASE_URL.includes("YOUR-PROJECT")) {
  $("loginErr").textContent = "Set your Supabase keys in config.js first (see SUPABASE-SETUP.md).";
} else {
  sb = createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
  init();
}

async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if (session) enterApp(session); 
  sb.auth.onAuthStateChange((_e, s) => { if (s) enterApp(s); });
}

/* ---------- AUTH ---------- */
$("loginBtn").addEventListener("click", login);
$("password").addEventListener("keydown", e => { if(e.key==="Enter") login(); });
async function login(){
  const email=$("email").value.trim(), password=$("password").value;
  if(!email||!password){ $("loginErr").textContent="Enter your email and password."; return; }
  $("loginBtn").disabled=true; $("loginErr").textContent="";
  const { error } = await sb.auth.signInWithPassword({ email, password });
  $("loginBtn").disabled=false;
  if(error){ $("loginErr").textContent=error.message; return; }
}
function enterApp(session){
  $("loginView").classList.add("hide");
  $("appView").classList.remove("hide");
  $("whoami").textContent = session.user.email;
  loadProducts();
}
$("signout").addEventListener("click", async () => { await sb.auth.signOut(); location.reload(); });

/* ---------- LOAD + RENDER ---------- */
async function loadProducts(){
  const { data, error } = await sb.from("products").select("*").order("sort",{ascending:true}).order("created_at",{ascending:false});
  if(error){ toast(error.message,true); return; }
  renderStats(data); renderList(data);
}
function money(p){ return "$"+Number(p||0).toFixed(2); }
function renderStats(items){
  const active=items.filter(i=>i.active).length;
  const cats=new Set(items.map(i=>i.category)).size;
  $("stats").innerHTML=`
    <div class="stat"><b>${items.length}</b><span>Total Products</span></div>
    <div class="stat"><b>${active}</b><span>Visible in Store</span></div>
    <div class="stat"><b>${cats}</b><span>Categories</span></div>`;
}
function renderList(items){
  if(!items.length){ $("list").innerHTML=`<div class="empty"><b>No products yet</b>Click “Add Product” to create your first one.</div>`; return; }
  $("list").innerHTML = items.map(p=>`
    <div class="prow">
      ${p.image_url ? `<img class="pthumb" src="${p.image_url}" alt="">` : `<div class="pthumb">P</div>`}
      <div class="pname">${esc(p.name)}${p.active?"":`<span class="badge-off">Hidden</span>`}<small>${p.description?esc(p.description).slice(0,60):""}</small></div>
      <div class="pcat">${esc(p.category)}</div>
      <div class="pprice">${p.price_from?`<small>from</small> `:""}${money(p.price)}</div>
      <div class="pacts">
        <button class="icon-btn" data-edit="${p.id}" title="Edit">✎</button>
        <button class="icon-btn del" data-del="${p.id}" title="Delete">🗑</button>
      </div>
    </div>`).join("");
  document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>openForm(items.find(x=>x.id===b.dataset.edit)));
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>removeProduct(b.dataset.del, items.find(x=>x.id===b.dataset.del)));
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---------- FORM ---------- */
$("addBtn").onclick=()=>openForm(); $("navAdd").onclick=()=>openForm();
$("modalClose").onclick=closeForm;
$("modal").addEventListener("click",e=>{ if(e.target===$("modal")) closeForm(); });
function openForm(p=null){
  editingId=p?p.id:null; pickedFile=null; existingImg=p?p.image_url:null;
  $("modalTitle").textContent=p?"Edit Product":"Add Product";
  $("pName").value=p?p.name:""; $("pPrice").value=p?p.price:""; $("pCat").value=p?p.category:"";
  $("pDesc").value=p?(p.description||""):""; $("pStripe").value=p?(p.stripe_url||""):"";
  $("pFrom").checked=p?!!p.price_from:false; $("pActive").checked=p?!!p.active:true;
  $("formErr").textContent="";
  paintDrop(p?p.image_url:null);
  $("modal").classList.remove("hide");
}
function closeForm(){ $("modal").classList.add("hide"); }
function paintDrop(url){
  const d=$("drop");
  d.querySelectorAll("img,.change").forEach(n=>n.remove());
  if(url){ const img=document.createElement("img"); img.src=url; const tag=document.createElement("div"); tag.className="change"; tag.textContent="Change"; d.append(img,tag); }
}
/* dropzone events */
const drop=$("drop"), file=$("file");
drop.onclick=()=>file.click();
file.onchange=()=>{ if(file.files[0]) setFile(file.files[0]); };
["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("drag");}));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("drag");}));
drop.addEventListener("drop",e=>{ const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith("image/")) setFile(f); });
function setFile(f){ pickedFile=f; paintDrop(URL.createObjectURL(f)); }

$("saveBtn").onclick=save;
async function save(){
  const name=$("pName").value.trim();
  const price=parseFloat($("pPrice").value);
  const category=$("pCat").value.trim()||"General";
  if(!name){ $("formErr").textContent="Product needs a name."; return; }
  if(isNaN(price)){ $("formErr").textContent="Enter a valid price."; return; }
  $("saveBtn").disabled=true; $("formErr").textContent=""; $("saveBtn").textContent="Saving…";
  try{
    let image_url=existingImg;
    if(pickedFile){ image_url=await uploadImage(pickedFile); }
    const row={ name, price, category,
      description:$("pDesc").value.trim()||null,
      stripe_url:$("pStripe").value.trim()||null,
      price_from:$("pFrom").checked, active:$("pActive").checked, image_url };
    let error;
    if(editingId){ ({ error }=await sb.from("products").update(row).eq("id",editingId)); }
    else { ({ error }=await sb.from("products").insert(row)); }
    if(error) throw error;
    closeForm(); toast(editingId?"Product updated":"Product added"); loadProducts();
  }catch(err){ $("formErr").textContent=err.message||"Something went wrong."; }
  finally{ $("saveBtn").disabled=false; $("saveBtn").textContent="Save Product"; }
}
async function uploadImage(f){
  const ext=(f.name.split(".").pop()||"jpg").toLowerCase();
  const path=`${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error }=await sb.storage.from(CFG.IMAGE_BUCKET||"product-images").upload(path,f,{cacheControl:"3600",upsert:false});
  if(error) throw error;
  const { data }=sb.storage.from(CFG.IMAGE_BUCKET||"product-images").getPublicUrl(path);
  return data.publicUrl;
}

/* ---------- DELETE ---------- */
async function removeProduct(id, p){
  if(!confirm(`Delete “${p?.name||"this product"}”? This can't be undone.`)) return;
  const { error }=await sb.from("products").delete().eq("id",id);
  if(error){ toast(error.message,true); return; }
  toast("Product deleted"); loadProducts();
}
</script>
</body>
</html>
